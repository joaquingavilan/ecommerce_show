<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ejemplo Store Admin</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        dark: '#111827',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 flex h-screen items-center justify-center font-sans">
    <div class="max-w-md w-full px-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 tracking-wider">
                Ejemplo<span class="text-primary">Store</span>
            </h1>
            <p class="text-sm text-gray-500 mt-2">Acceso al Panel de Administración</p>
        </div>

        <div class="bg-white rounded-xl shadow-md border border-gray-100 p-8">
            <form method="post" action="{% url 'dashboard_login' %}" class="space-y-6">
                {% csrf_token %}

                {% if form.errors %}
                <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm text-center">
                    Usuario o contraseña incorrectos. Por favor, inténtelo de nuevo.
                </div>
                {% endif %}

                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">Usuario</label>
                    <div class="mt-1">
                        <input id="id_username" name="username" type="text" autocomplete="username" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    </div>
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <div class="mt-1">
                        <input id="id_password" name="password" type="password" autocomplete="current-password" required
                            class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                        Iniciar Sesión
                    </button>
                    <input type="hidden" name="next" value="{{ next|default:'' }}" />
                </div>
            </form>
            <div class="mt-6 text-center">
                <a href="{% url 'store_front' %}" class="text-sm font-medium text-primary hover:text-indigo-500">
                    Volver a la tienda
                </a>
            </div>
        </div>
    </div>
</body>

</html>

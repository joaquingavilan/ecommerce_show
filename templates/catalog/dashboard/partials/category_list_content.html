{% for category in categories %}
<div
    class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col justify-between hover:shadow-md transition-all duration-300 group">
    <div>
        <div class="flex items-start justify-between">
            <h3 class="text-xl font-bold text-gray-900 group-hover:text-primary transition-colors">{{ category.name }}
            </h3>
            <span
                class="inline-flex items-center justify-center h-8 w-8 rounded-full bg-emerald-50 text-emerald-600 font-semibold text-sm">
                {{ category.products.count }}
            </span>
        </div>
        <p class="text-sm text-gray-500 mt-1 mb-4 italic text-xs">/{{ category.slug }}</p>
        <p class="text-sm text-gray-600 line-clamp-2">
            {{ category.description|default:"Sin descripción proporcionada para esta categoría." }}
        </p>
    </div>

    <div class="mt-6 pt-4 border-t border-gray-100 flex justify-end space-x-3">
        <button hx-get="{% url 'category_edit' category.pk %}" hx-target="#modal-container"
            class="text-gray-400 hover:text-primary transition-colors flex items-center text-sm font-medium">
            <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
            Editar
        </button>
        <button hx-get="{% url 'category_delete' category.pk %}" hx-target="#modal-container"
            class="text-gray-400 hover:text-red-600 transition-colors flex items-center text-sm font-medium">
            <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            Eliminar
        </button>
    </div>
</div>
{% empty %}
<div
    class="col-span-1 md:col-span-2 lg:col-span-3 bg-white p-12 rounded-xl border border-dashed border-gray-300 text-center">
    <svg class="mx-auto h-12 w-12 text-gray-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
    </svg>
    <h3 class="text-lg font-medium text-gray-900 mb-1">Sin categorías</h3>
    <p class="text-gray-500">Agrega tu primera categoría para organizar tus productos.</p>
</div>
{% endfor %}

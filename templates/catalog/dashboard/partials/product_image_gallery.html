{% if product.images.all %}
<h4 class="text-sm font-semibold text-gray-900 mb-3">Galería Actual</h4>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
    {% for img in product.images.all %}
    <div
        class="relative group rounded-lg overflow-hidden border {% if img.is_main %}border-emerald-500 ring-2 ring-emerald-500 ring-opacity-50{% else %}border-gray-200{% endif %}">
        <img src="{{ img.image.url }}" alt="Imagen {{ forloop.counter }}" class="w-full h-24 object-cover">

        <!-- Overlay -->
        <div
            class="absolute inset-0 bg-black bg-opacity-40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-center items-center space-y-2">
            {% if not img.is_main %}
            <button type="button" hx-post="{% url 'product_image_main' img.pk %}" hx-target="#image-gallery"
                class="bg-white text-emerald-600 text-xs font-bold py-1 px-3 rounded shadow hover:bg-emerald-50 w-24">
                Principal
            </button>
            {% endif %}
            <button type="button" hx-post="{% url 'product_image_delete' img.pk %}" hx-target="#image-gallery"
                class="bg-red-500 text-white text-xs font-bold py-1 px-3 rounded shadow hover:bg-red-600 w-24">
                Eliminar
            </button>
        </div>

        {% if img.is_main %}
        <span
            class="absolute top-1 left-1 bg-emerald-500 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm">
            Principal
        </span>
        {% endif %}
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-sm text-gray-500 italic">No hay imágenes subidas aún.</p>
{% endif %}
